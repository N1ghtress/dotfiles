################
### MONITORS ###
################
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = DP-2, 1920x1080@144, 0x0, 1
monitor = HDMI-A-2, 1920x1080@60, 1920x0, 1

workspace = 1, monitor:DP-2
workspace = 2, monitor:HDMI-A-2
workspace = 3, monitor:HDMI-A-2
workspace = 4, monitor:HDMI-A-2

###################
### MY PROGRAMS ###
###################
# See https://wiki.hyprland.org/Configuring/Keywords/
$terminal = kitty
$screenshot_clip = hyprshot -m region --clipboard-only
$screenshot = hyprshot -m region
$fileManager = thunar
$menu = rofi -show drun

#################
### AUTOSTART ###
#################
# Autostart necessary processes (like notifications daemons, status bars, etc.)
exec-once = systemctl --user start hyprpolkitagent
exec-once = waybar
exec-once = hyprpaper
exec-once = $BROWSER
exec-once = discord
exec-once = steam

#############################
### ENVIRONMENT VARIABLES ###
#############################
# See https://wiki.hyprland.org/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = DARK, "#37352F"
env = WHITE_BONE, "#D8D0C1"
env = SMOKY_BLACK, "#100C08"
env = PEACH, "#FFA570"
env = LIGHT_PEACH, "#FFCBAD"
env = YELLOW, "#FFB30F"
env = RED, "#D72638"
env = ORANGE, "#ED7D3A"
env = PURPLE, "#C47AC0"
env = YELLOW_GREEN, "#B0DB43"
env = BLUE, "#355691"
env = GREEN, "#0C7C59"

#####################
### LOOK AND FEEL ###
#####################
# Refer to https://wiki.hyprland.org/Configuring/Variables/
# https://wiki.hyprland.org/Configuring/Variables/#general

general {
    gaps_in = 0
    gaps_out = 0

    border_size = 0

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 2, myBezier
    animation = windowsOut, 1, 2, default, popin 80%
    animation = border, 1, 2, default
    animation = borderangle, 1, 2, default
    animation = fade, 1, 2, default
    animation = workspaces, 1, 2, default
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

#############
### INPUT ###
#############
# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = fr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 0
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$1 = ampersand
$2 = eacute
$3 = quotedbl
$4 = apostrophe
$5 = parenleft
$6 = minus
$7 = egrave
$8 = underscore
$9 = ccedilla
$0 = agrave

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, S, exec, $screenshot_clip
bind = , Print, exec, $screenshot
bind = $mainMod, Z, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, L, exec, hyprlock

# Fullscreens focused window
bind = $mainMod, f, fullscreen

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move window with mainMod + arrow keys
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, $1, workspace, 1
bind = $mainMod, $2, workspace, 2
bind = $mainMod, $3, workspace, 3
bind = $mainMod, $4, workspace, 4
bind = $mainMod, $5, workspace, 5
bind = $mainMod, $6, workspace, 6
bind = $mainMod, $7, workspace, 7
bind = $mainMod, $8, workspace, 8
bind = $mainMod, $9, workspace, 9
bind = $mainMod, $0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, $1, movetoworkspace, 1
bind = $mainMod SHIFT, $2, movetoworkspace, 2
bind = $mainMod SHIFT, $3, movetoworkspace, 3
bind = $mainMod SHIFT, $4, movetoworkspace, 4
bind = $mainMod SHIFT, $5, movetoworkspace, 5
bind = $mainMod SHIFT, $6, movetoworkspace, 6
bind = $mainMod SHIFT, $7, movetoworkspace, 7
bind = $mainMod SHIFT, $8, movetoworkspace, 8
bind = $mainMod SHIFT, $9, movetoworkspace, 9
bind = $mainMod SHIFT, $0, movetoworkspace, 10

# Scroll workspaces forward/backward with mainMod + [SHIFT] + TAB
bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e+1

binds {
    drag_threshold = 25 # Fire drag event after dragging for more than N pixels.
}

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

windowrule = match:modal true, float on
windowrule = match:class KeePass2, float on
windowrule = match:class firefox, workspace 2
windowrule = match:class discord, workspace 3

windowrule = match:class (firefox|discord|steam.*), no_initial_focus on

windowrule {
    name = steamshit
    match:class = steam.*
    workspace = 4
}

windowrule {
    name = games
    match:content = 3
    workspace = 1
}
