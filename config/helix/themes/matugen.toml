# Helix Theme Template using Material You with improved contrast

# --- Syntax Elements ---

"attribute" = "#91cef5"
"type" = "#b6c9d8"
"type.enum.variant" = "#b6c9d8"
"constructor" = "#c5e7ff"

"constant" = "#cbc1e9"
"constant.character" = "#cbc1e9"
"constant.character.escape" = "#4a4263"

"string" = "#91cef5"
"string.regexp" = "#4a4263"
"string.special" = "#c5e7ff"
"string.special.symbol" = "#ffb4ab"

"comment" = { fg = "#c1c7ce", modifiers = ["italic"] }

"variable" = "#dfe3e7"
"variable.parameter" = { fg = "#93000a", modifiers = ["italic"] }
"variable.builtin" = "#ffb4ab"
"variable.other.member" = "#91cef5"

"label" = "#c5e7ff"

"punctuation" = "#c1c7ce"
"punctuation.special" = "#b6c9d8"

"keyword" = "#91cef5"
"keyword.control.conditional" = { fg = "#91cef5", modifiers = ["italic"] }

"operator" = "#b6c9d8"

"function" = "#91cef5"
"function.macro" = "#004c6a"

"tag" = "#91cef5"
"namespace" = { fg = "#b6c9d8", modifiers = ["italic"] }

"special" = "#91cef5"

# --- Markup ---

"markup.heading.1" = "#ffb4ab"
"markup.heading.2" = "#91cef5"
"markup.heading.3" = "#b6c9d8"
"markup.heading.4" = "#cbc1e9"
"markup.heading.5" = "#c5e7ff"
"markup.heading.6" = "#004c6a"

"markup.list" = "#b6c9d8"
"markup.list.unchecked" = "#c1c7ce"
"markup.list.checked" = "#c5e7ff"

"markup.bold" = { fg = "#91cef5", modifiers = ["bold"] }
"markup.italic" = { fg = "#b6c9d8", modifiers = ["italic"] }

"markup.link.url" = { fg = "#91cef5", modifiers = ["italic", "underlined"] }
"markup.link.text" = "#c5e7ff"
"markup.link.label" = "#cbc1e9"
"markup.raw" = "#e7deff"
"markup.quote" = "#4a4263"

# --- Diff ---

"diff.plus" = "#cbc1e9"
"diff.minus" = "#ffb4ab"
"diff.delta" = "#91cef5"

# --- UI Elements ---

"ui.background" = { fg = "#dfe3e7", bg = "none" }

"ui.linenr" = { fg = "#c1c7ce" }
"ui.linenr.selected" = { fg = "#c5e7ff" }

"ui.statusline" = { fg = "#c5e7ff", bg = "none" }
"ui.statusline.inactive" = { fg = "#c1c7ce", bg = "none" }
"ui.statusline.normal" = { fg = "#0f1417", bg = "none", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#0f1417", bg = "none", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#0f1417", bg = "none", modifiers = ["bold"] }

"ui.popup" = { fg = "#dfe3e7", bg = "none" }
"ui.window" = { fg = "#c1c7ce" }
"ui.help" = { fg = "#c1c7ce", bg = "none" }

"ui.bufferline" = { fg = "#c1c7ce", bg = "none" }
"ui.bufferline.active" = { fg = "#00344b", bg = "#91cef5", underline = { color = "#91cef5", style = "line" } }
"ui.bufferline.background" = { bg = "none" }

"ui.text" = "#dfe3e7"
"ui.text.focus" = { fg = "#91cef5", bg = "none", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "#c1c7ce" }
"ui.text.directory" = { fg = "#91cef5" }

"ui.virtual" = "#c1c7ce"
"ui.virtual.ruler" = { bg = "none" }
"ui.virtual.indent-guide" = "#181c1f"
"ui.virtual.inlay-hint" = { fg = "#c1c7ce", bg = "none" }
"ui.virtual.jump-label" = { fg = "#004c6a", modifiers = ["bold"] }

"ui.selection" = { bg = "#41484d" }

"ui.cursor" = { fg = "#0f1417", bg = "#c5e7ff" }
"ui.cursor.primary" = { fg = "#0f1417", bg = "#c5e7ff" }
"ui.cursor.match" = { fg = "#c5e7ff", modifiers = ["bold"] }

"ui.highlight" = { bg = "#374955", modifiers = ["bold"] }

"ui.menu" = { fg = "#dfe3e7", bg = "none" }
"ui.menu.selected" = { fg = "#91cef5", bg = "none", modifiers = ["bold"] }

# --- Diagnostics ---

"diagnostic.error" = { fg = "#ffb4ab", underline = { color = "#ffb4ab", style = "curl" } }
"diagnostic.warning" = { fg = "#b6c9d8", underline = { color = "#b6c9d8", style = "curl" } }
"diagnostic.info" = { fg = "#cbc1e9", underline = { color = "#cbc1e9", style = "curl" } }
"diagnostic.hint" = { fg = "#4a4263", underline = { color = "#4a4263", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

# --- Fallbacks (non-template usage) ---

error = "#ffb4ab"
warning = "#cbc1e9"
info = "#91cef5"
hint = "#b6c9d8"
