# Helix Theme Template using Material You with improved contrast

# --- Syntax Elements ---

"attribute" = "#eeb4ea"
"type" = "#d9bfd4"
"type.enum.variant" = "#d9bfd4"
"constructor" = "#ffd6fa"

"constant" = "#f6b8aa"
"constant.character" = "#f6b8aa"
"constant.character.escape" = "#663b32"

"string" = "#eeb4ea"
"string.regexp" = "#663b32"
"string.special" = "#ffd6fa"
"string.special.symbol" = "#ffb4ab"

"comment" = { fg = "#d0c3cc", modifiers = ["italic"] }

"variable" = "#ebdfe6"
"variable.parameter" = { fg = "#93000a", modifiers = ["italic"] }
"variable.builtin" = "#ffb4ab"
"variable.other.member" = "#eeb4ea"

"label" = "#ffd6fa"

"punctuation" = "#d0c3cc"
"punctuation.special" = "#d9bfd4"

"keyword" = "#eeb4ea"
"keyword.control.conditional" = { fg = "#eeb4ea", modifiers = ["italic"] }

"operator" = "#d9bfd4"

"function" = "#eeb4ea"
"function.macro" = "#633664"

"tag" = "#eeb4ea"
"namespace" = { fg = "#d9bfd4", modifiers = ["italic"] }

"special" = "#eeb4ea"

# --- Markup ---

"markup.heading.1" = "#ffb4ab"
"markup.heading.2" = "#eeb4ea"
"markup.heading.3" = "#d9bfd4"
"markup.heading.4" = "#f6b8aa"
"markup.heading.5" = "#ffd6fa"
"markup.heading.6" = "#633664"

"markup.list" = "#d9bfd4"
"markup.list.unchecked" = "#d0c3cc"
"markup.list.checked" = "#ffd6fa"

"markup.bold" = { fg = "#eeb4ea", modifiers = ["bold"] }
"markup.italic" = { fg = "#d9bfd4", modifiers = ["italic"] }

"markup.link.url" = { fg = "#eeb4ea", modifiers = ["italic", "underlined"] }
"markup.link.text" = "#ffd6fa"
"markup.link.label" = "#f6b8aa"
"markup.raw" = "#ffdad3"
"markup.quote" = "#663b32"

# --- Diff ---

"diff.plus" = "#f6b8aa"
"diff.minus" = "#ffb4ab"
"diff.delta" = "#eeb4ea"

# --- UI Elements ---

"ui.background" = { fg = "#ebdfe6", bg = "none" }

"ui.linenr" = { fg = "#d0c3cc" }
"ui.linenr.selected" = { fg = "#ffd6fa" }

"ui.statusline" = { fg = "#ffd6fa", bg = "none" }
"ui.statusline.inactive" = { fg = "#d0c3cc", bg = "none" }
"ui.statusline.normal" = { fg = "#171216", bg = "none", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#171216", bg = "none", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#171216", bg = "none", modifiers = ["bold"] }

"ui.popup" = { fg = "#ebdfe6", bg = "none" }
"ui.window" = { fg = "#d0c3cc" }
"ui.help" = { fg = "#d0c3cc", bg = "none" }

"ui.bufferline" = { fg = "#d0c3cc", bg = "none" }
"ui.bufferline.active" = { fg = "#4a204c", bg = "#eeb4ea", underline = { color = "#eeb4ea", style = "line" } }
"ui.bufferline.background" = { bg = "none" }

"ui.text" = "#ebdfe6"
"ui.text.focus" = { fg = "#eeb4ea", bg = "none", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "#d0c3cc" }
"ui.text.directory" = { fg = "#eeb4ea" }

"ui.virtual" = "#d0c3cc"
"ui.virtual.ruler" = { bg = "none" }
"ui.virtual.indent-guide" = "#1f1a1f"
"ui.virtual.inlay-hint" = { fg = "#d0c3cc", bg = "none" }
"ui.virtual.jump-label" = { fg = "#633664", modifiers = ["bold"] }

"ui.selection" = { bg = "#4d444b" }

"ui.cursor" = { fg = "#171216", bg = "#ffd6fa" }
"ui.cursor.primary" = { fg = "#171216", bg = "#ffd6fa" }
"ui.cursor.match" = { fg = "#ffd6fa", modifiers = ["bold"] }

"ui.highlight" = { bg = "#544152", modifiers = ["bold"] }

"ui.menu" = { fg = "#ebdfe6", bg = "none" }
"ui.menu.selected" = { fg = "#eeb4ea", bg = "none", modifiers = ["bold"] }

# --- Diagnostics ---

"diagnostic.error" = { fg = "#ffb4ab", underline = { color = "#ffb4ab", style = "curl" } }
"diagnostic.warning" = { fg = "#d9bfd4", underline = { color = "#d9bfd4", style = "curl" } }
"diagnostic.info" = { fg = "#f6b8aa", underline = { color = "#f6b8aa", style = "curl" } }
"diagnostic.hint" = { fg = "#663b32", underline = { color = "#663b32", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

# --- Fallbacks (non-template usage) ---

error = "#ffb4ab"
warning = "#f6b8aa"
info = "#eeb4ea"
hint = "#d9bfd4"
